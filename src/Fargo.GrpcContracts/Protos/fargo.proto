syntax = "proto3";

option csharp_namespace = "Fargo.GrpcContracts";

package fargo.grpc.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

enum ActionType {
  ACTION_TYPE_CREATE_ARTICLE = 0;
  ACTION_TYPE_DELETE_ARTICLE = 1;
  ACTION_TYPE_EDIT_ARTICLE = 2;
  ACTION_TYPE_CREATE_ITEM = 3;
  ACTION_TYPE_DELETE_ITEM = 4;
  ACTION_TYPE_EDIT_ITEM = 5;
  ACTION_TYPE_CREATE_USER = 6;
  ACTION_TYPE_DELETE_USER = 7;
  ACTION_TYPE_EDIT_USER = 8;
  ACTION_TYPE_CHANGE_OTHER_USER_PASSWORD = 9;
  ACTION_TYPE_CREATE_USER_GROUP = 10;
  ACTION_TYPE_DELETE_USER_GROUP = 11;
  ACTION_TYPE_EDIT_USER_GROUP = 12;
  ACTION_TYPE_CHANGE_USER_GROUP_MEMBERS = 13;
  ACTION_TYPE_CREATE_PARTITION = 14;
  ACTION_TYPE_DELETE_PARTITION = 15;
  ACTION_TYPE_EDIT_PARTITION = 16;
  ACTION_TYPE_ADD_BARCODE = 17;
  ACTION_TYPE_REMOVE_BARCODE = 18;
}

enum ArticleBarcodeType {
  ARTICLE_BARCODE_TYPE_EAN13 = 0;
  ARTICLE_BARCODE_TYPE_EAN8 = 1;
  ARTICLE_BARCODE_TYPE_UPC_A = 2;
  ARTICLE_BARCODE_TYPE_UPC_E = 3;
  ARTICLE_BARCODE_TYPE_CODE128 = 4;
  ARTICLE_BARCODE_TYPE_CODE39 = 5;
  ARTICLE_BARCODE_TYPE_ITF14 = 6;
  ARTICLE_BARCODE_TYPE_GS1128 = 7;
  ARTICLE_BARCODE_TYPE_QR_CODE = 8;
  ARTICLE_BARCODE_TYPE_DATA_MATRIX = 9;
}

message GuidRequest {
  string guid = 1;
}

message GuidResult {
  string guid = 1;
}

message GetManyRequest {
  google.protobuf.Timestamp temporal_as_of = 1;
  optional int32 page = 2;
  optional int32 limit = 3;
  repeated string child_of_any_of_these_partitions = 4;
  optional bool not_child_of_any_partition = 5;
}

message LoginRequest {
  string nameid = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message PasswordUpdateRequest {
  string new_password = 1;
  optional string current_password = 2;
}

message AuthInfo {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  bool is_admin = 4;
  repeated ActionType permission_actions = 5;
  repeated string partition_accesses = 6;
}

message PermissionInfo {
  string guid = 1;
  ActionType action = 2;
}

message PermissionUpdate {
  ActionType action = 1;
}

message MassInfo {
  double value = 1;
  string unit = 2;
}

message LengthInfo {
  double value = 1;
  string unit = 2;
}

message ArticleMetricsInfo {
  MassInfo mass = 1;
  LengthInfo length_x = 2;
  LengthInfo length_y = 3;
  LengthInfo length_z = 4;
}

message ArticleBarcodesInfo {
  optional string ean13 = 1;
  optional string ean8 = 2;
  optional string upc_a = 3;
  optional string upc_e = 4;
  optional string code128 = 5;
  optional string code39 = 6;
  optional string itf14 = 7;
  optional string gs1128 = 8;
  optional string qr_code = 9;
  optional string data_matrix = 10;
}

message ArticleBarcode {
  string barcode = 1;
  ArticleBarcodeType type = 2;
}

message ArticleInfo {
  string guid = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Duration shelf_life = 4;
  ArticleMetricsInfo metrics = 5;
  ArticleBarcodesInfo barcodes = 6;
  repeated string partitions = 7;
  bool is_active = 8;
  optional string edited_by_guid = 9;
}

message ArticleList {
  repeated ArticleInfo articles = 1;
}

message GetArticleRequest {
  string article_guid = 1;
  google.protobuf.Timestamp temporal_as_of = 2;
}

message GetArticleByBarcodeRequest {
  ArticleBarcode article_barcode = 1;
  google.protobuf.Timestamp temporal_as_of = 2;
}

message ArticleCreateRequest {
  string name = 1;
  optional string description = 2;
  google.protobuf.Duration shelf_life = 3;
  ArticleMetricsInfo metrics = 4;
  ArticleBarcodesInfo barcodes = 5;
  repeated string partitions = 6;
  optional bool is_active = 7;
}

message ArticleUpdateRequest {
  string article_guid = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Duration shelf_life = 4;
  ArticleMetricsInfo metrics = 5;
  ArticleBarcodesInfo barcodes = 6;
  repeated string partitions = 7;
  bool is_active = 8;
}

message ItemInfo {
  string guid = 1;
  string article_guid = 2;
  google.protobuf.Timestamp production_date = 3;
  optional string parent_container_guid = 4;
  repeated string partitions = 5;
  optional string edited_by_guid = 6;
}

message ItemList {
  repeated ItemInfo items = 1;
}

message GetItemRequest {
  string item_guid = 1;
  google.protobuf.Timestamp temporal_as_of = 2;
}

message ItemCreateRequest {
  string article_guid = 1;
  google.protobuf.Timestamp production_date = 2;
  repeated string partitions = 3;
}

message ItemUpdateRequest {
  string item_guid = 1;
  repeated string partitions = 2;
  optional string parent_container_guid = 3;
}

message PartitionInfo {
  string guid = 1;
  string name = 2;
  string description = 3;
  optional string parent_partition_guid = 4;
  bool is_active = 5;
  optional string edited_by_guid = 6;
}

message PartitionList {
  repeated PartitionInfo partitions = 1;
}

message GetPartitionRequest {
  string partition_guid = 1;
  google.protobuf.Timestamp temporal_as_of = 2;
}

message PartitionCreateRequest {
  string name = 1;
  optional string description = 2;
  optional string parent_partition_guid = 3;
}

message PartitionUpdateRequest {
  string partition_guid = 1;
  optional string name = 2;
  optional string description = 3;
  optional string parent_partition_guid = 4;
  optional bool is_active = 5;
}

message UserInfo {
  string guid = 1;
  string nameid = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  string description = 5;
  google.protobuf.Duration default_password_expiration_period = 6;
  google.protobuf.Timestamp require_password_change_at = 7;
  repeated PermissionInfo permissions = 8;
  repeated string partitions = 9;
  repeated string user_groups = 10;
  bool is_active = 11;
  optional string edited_by_guid = 12;
}

message UserList {
  repeated UserInfo users = 1;
}

message GetUserRequest {
  string user_guid = 1;
  google.protobuf.Timestamp temporal_as_of = 2;
}

message UserCreateRequest {
  string nameid = 1;
  string password = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  optional string description = 5;
  repeated PermissionUpdate permissions = 6;
  google.protobuf.Duration default_password_expiration_period = 7;
  repeated string partitions = 8;
  repeated string user_groups = 9;
}

message UserUpdateRequest {
  string user_guid = 1;
  optional string nameid = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  optional string description = 5;
  optional string password = 6;
  optional bool is_active = 7;
  repeated PermissionUpdate permissions = 8;
  bool permissions_set = 9;
  google.protobuf.Duration default_password_expiration_period = 10;
  repeated string partitions = 11;
  bool partitions_set = 12;
  repeated string user_groups = 13;
  bool user_groups_set = 14;
}

message UserGroupInfo {
  string guid = 1;
  string nameid = 2;
  string description = 3;
  repeated PermissionInfo permissions = 4;
  repeated string partitions = 5;
  bool is_active = 6;
  optional string edited_by_guid = 7;
}

message UserGroupList {
  repeated UserGroupInfo user_groups = 1;
}

message GetUserGroupRequest {
  string user_group_guid = 1;
  google.protobuf.Timestamp temporal_as_of = 2;
}

message UserGroupCreateRequest {
  string nameid = 1;
  optional string description = 2;
  repeated PermissionUpdate permissions = 3;
  repeated string partitions = 4;
}

message UserGroupUpdateRequest {
  string user_group_guid = 1;
  optional string nameid = 2;
  optional string description = 3;
  optional bool is_active = 4;
  repeated PermissionUpdate permissions = 5;
  bool permissions_set = 6;
  repeated string partitions = 7;
  bool partitions_set = 8;
}

service AuthenticationGrpc {
  rpc Login(LoginRequest) returns (AuthInfo);
  rpc Logout(RefreshRequest) returns (google.protobuf.Empty);
  rpc Refresh(RefreshRequest) returns (AuthInfo);
  rpc ChangePassword(PasswordUpdateRequest) returns (google.protobuf.Empty);
}

service ArticlesGrpc {
  rpc GetArticle(GetArticleRequest) returns (ArticleInfo);
  rpc GetArticleByBarcode(GetArticleByBarcodeRequest) returns (ArticleInfo);
  rpc GetArticles(GetManyRequest) returns (ArticleList);
  rpc CreateArticle(ArticleCreateRequest) returns (GuidResult);
  rpc UpdateArticle(ArticleUpdateRequest) returns (google.protobuf.Empty);
  rpc DeleteArticle(GuidRequest) returns (google.protobuf.Empty);
}

service ItemsGrpc {
  rpc GetItem(GetItemRequest) returns (ItemInfo);
  rpc GetItems(GetManyRequest) returns (ItemList);
  rpc CreateItem(ItemCreateRequest) returns (GuidResult);
  rpc UpdateItem(ItemUpdateRequest) returns (google.protobuf.Empty);
  rpc DeleteItem(GuidRequest) returns (google.protobuf.Empty);
}

service PartitionsGrpc {
  rpc GetPartition(GetPartitionRequest) returns (PartitionInfo);
  rpc GetPartitions(GetManyRequest) returns (PartitionList);
  rpc CreatePartition(PartitionCreateRequest) returns (GuidResult);
  rpc UpdatePartition(PartitionUpdateRequest) returns (google.protobuf.Empty);
  rpc DeletePartition(GuidRequest) returns (google.protobuf.Empty);
}

service UsersGrpc {
  rpc GetUser(GetUserRequest) returns (UserInfo);
  rpc GetUsers(GetManyRequest) returns (UserList);
  rpc CreateUser(UserCreateRequest) returns (GuidResult);
  rpc UpdateUser(UserUpdateRequest) returns (google.protobuf.Empty);
  rpc DeleteUser(GuidRequest) returns (google.protobuf.Empty);
}

service UserGroupsGrpc {
  rpc GetUserGroup(GetUserGroupRequest) returns (UserGroupInfo);
  rpc GetUserGroups(GetManyRequest) returns (UserGroupList);
  rpc CreateUserGroup(UserGroupCreateRequest) returns (GuidResult);
  rpc UpdateUserGroup(UserGroupUpdateRequest) returns (google.protobuf.Empty);
  rpc DeleteUserGroup(GuidRequest) returns (google.protobuf.Empty);
}
