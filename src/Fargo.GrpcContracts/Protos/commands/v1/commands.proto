syntax = "proto3";

package fargo.commands.v1;

option csharp_namespace = "Fargo.GrpcContracts.Commands.V1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

service WorkspaceService {
  rpc BeginWorkspace (BeginWorkspaceRequest) returns (BeginWorkspaceResponse);
  rpc QueueCommand (QueueCommandRequest) returns (QueueCommandResponse);
  rpc CommitWorkspace (CommitWorkspaceRequest) returns (CommitWorkspaceResponse);
  rpc RollbackWorkspace (RollbackWorkspaceRequest) returns (google.protobuf.Empty);
}

message BeginWorkspaceRequest {
  string correlation_id = 1;
}

message BeginWorkspaceResponse {
  string correlation_id = 1;
  string workspace_guid = 2;
}

message QueueCommandRequest {
  string correlation_id = 1;
  string workspace_guid = 2;
  string command_id = 3;
  CommandEnvelope command = 4;
}

message CommandEnvelope {
  oneof payload {
    ArticleCreateCommand article_create = 1;
    ArticleRenameCommand article_rename = 2;
    ItemCreateCommand item_create = 3;
    ItemMoveToContainerCommand item_move_to_container = 4;
    PartitionCreateCommand partition_create = 5;
    PartitionRenameCommand partition_rename = 6;
    PartitionMoveCommand partition_move = 7;
  }
}

message ArticleCreateCommand {
  string name = 1;
}

message ArticleRenameCommand {
  string article_guid = 1;
  string name = 2;
}

message ItemCreateCommand {
  string article_guid = 1;
  google.protobuf.Timestamp production_date = 2;
}

message ItemMoveToContainerCommand {
  string item_guid = 1;
  google.protobuf.StringValue parent_container_guid = 2;
}

message PartitionCreateCommand {
  string name = 1;
}

message PartitionRenameCommand {
  string partition_guid = 1;
  string name = 2;
}

message PartitionMoveCommand {
  string partition_guid = 1;
  string parent_partition_guid = 2;
}

message QueueCommandResponse {
  string correlation_id = 1;
  string workspace_guid = 2;
  string command_id = 3;
  int32 sequence = 4;
  string reserved_entity_guid = 5;
}

message CommitWorkspaceRequest {
  string correlation_id = 1;
  string workspace_guid = 2;
}

message CommitWorkspaceResponse {
  string correlation_id = 1;
  string workspace_guid = 2;
  repeated CommittedCommandResult commands = 3;
}

message CommittedCommandResult {
  string command_id = 1;
  int32 sequence = 2;
  string entity_guid = 3;
}

message RollbackWorkspaceRequest {
  string correlation_id = 1;
  string workspace_guid = 2;
}
